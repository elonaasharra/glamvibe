{% extends "core/base.html" %}

{% block title %}Create Post | GlamVibe{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<h2 class="mb-4 text-center">Create a Blog Post</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Title</label>
{{ form.title }}
</div>

<div class="mb-3">
<label class="form-label">Content</label>
{{ form.content }}
</div>

<div class="mb-4">
<label class="form-label">Image</label>
{{ form.image }}
</div>

<button type="submit" class="btn btn-dark w-100">
Publish Post
</button>

</form>

</div>

</div>

</div>

<style>

input[type="text"],
textarea,
input[type="file"]{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
transition:0.2s;
}

input[type="text"]:focus,
textarea:focus{
border-color:#000;
outline:none;
box-shadow:0 0 0 2px rgba(0,0,0,0.05);
}

textarea{
min-height:180px;
resize:vertical;
}

</style>

{% endblock %}
