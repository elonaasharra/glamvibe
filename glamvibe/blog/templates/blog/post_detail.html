{% extends 'core/base.html' %}
{% block title %}{{ post.title }} | GlamVibe{% endblock %}

{% block content %}

<section class="container py-5">

  <!-- HERO -->
  <header class="page-hero">
    <h1 class="page-title">{{ post.title }}</h1>

    <p class="page-subtitle">
      Posted by <strong>{{ post.author.username }}</strong>
      • {{ post.created_at|date:"F d, Y" }}
    </p>

    <div class="page-divider"></div>
  </header>

  <!-- IMAGE -->
  <div class="article-detail-img text-center mb-5">
    <img src="{{ post.image.url }}" alt="{{ post.title }}">
  </div>

  <!-- CONTENT -->
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="article-content">
        {{ post.content }}
      </div>

      <!-- ACTIONS -->
      <div class="article-actions mt-5">

        <a href="{% url 'blog:blog_home' %}" class="back-link">
          ← Back to Blog
        </a>

        <button id="like-btn" data-slug="{{ post.slug }}" class="like-btn">

          {% if user in post.liked_by.all %}
            <i class="bi bi-heart-fill text-danger"></i>
          {% else %}
            <i class="bi bi-heart"></i>
          {% endif %}

          <span id="like-count">{{ post.likes }}</span>

        </button>

      </div>

    </div>
  </div>

</section>

<!-- JS -->
<script>
document.getElementById("like-btn").addEventListener("click", function(){

  const slug = this.dataset.slug;

  fetch(`/blog/like/${slug}/`, {
    method: "POST",
    headers: {
      "X-CSRFToken": "{{ csrf_token }}"
    }
  })
  .then(response => response.json())
  .then(data => {

    document.getElementById("like-count").innerText = data.likes;

    const icon = document.querySelector("#like-btn i");

    if(data.liked){
      icon.className = "bi bi-heart-fill text-danger";
    } else {
      icon.className = "bi bi-heart";
    }

  });

});
</script>

{% endblock %}
