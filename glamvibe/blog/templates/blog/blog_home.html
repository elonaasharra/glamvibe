{% extends 'core/base.html' %}
{% block title %}Blog | GlamVibe{% endblock %}

{% block content %}
<h1>Blog</h1>

<div class="container">
  <div class="row">

    {% for post in posts %}
    <div class="col-md-4">

      <a href="{{ post.get_absolute_url }}">

        <img src="{{ post.image.url }}" style="width:100%">

        <h3>{{ post.title }}</h3>

        <p>{{ post.excerpt|truncatewords:20 }}</p>

        <p>❤ {{ post.likes }}</p>

      </a>

    </div>
    {% endfor %}

  </div>
</div>
{% endblock %}
