{% extends "core/base.html" %}
{% load static %}
{% block title %}Register | GlamVibe{% endblock %}

{% block content %}

<section class="login-page py-5">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="contact-card text-center">

<h3 class="mb-2">Create Account</h3>
<p class="text-muted mb-4">
Join the GlamVibe community
</p>

<form method="POST" id="registerForm">

{% csrf_token %}

<div class="mb-3 text-start">
<label class="form-label">Username</label>
<input type="text" name="username"
class="form-control contact-input"
placeholder="Username" required>
</div>

<div class="mb-3 text-start">
<label class="form-label">Email</label>
<input type="email" name="email"
class="form-control contact-input"
placeholder="you@email.com" required>
</div>

<div class="mb-3 text-start">
<label class="form-label">Password</label>
<input type="password" name="password1"
class="form-control contact-input"
placeholder="Password" required>
</div>

<div class="mb-3 text-start">
<label class="form-label">Confirm Password</label>
<input type="password" name="password2"
class="form-control contact-input"
placeholder="Confirm password" required>
</div>

<div class="d-grid mb-3">
<button type="submit" class="btn contact-btn">
Create Account
</button>
</div>

<p class="small text-muted mb-0">
Already have an account?
<a href="{% url 'login' %}" class="fw-semibold">
Login
</a>
</p>

</form>

</div>

</div>

</div>

</div>

</section>

{% endblock %}
<script>

document.getElementById("registerForm").addEventListener("submit", function(e){

let username = document.querySelector("input[name='username']").value.trim();
let email = document.querySelector("input[name='email']").value.trim();
let password1 = document.querySelector("input[name='password1']").value.trim();
let password2 = document.querySelector("input[name='password2']").value.trim();

let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
let passwordRegex = /^(?=.*[A-Z])(?=.*[0-9])(?=.*[\W_]).{8,}$/;

if(username.length < 3){
    alert("Username must be at least 3 characters.");
    e.preventDefault();
    return;
}

if(!emailRegex.test(email)){
    alert("Please enter a valid email address.");
    e.preventDefault();
    return;
}

if(!passwordRegex.test(password1)){
    alert("Password must contain at least 8 characters, one uppercase letter, one number and one symbol.");
    e.preventDefault();
    return;
}

if(password1.toLowerCase() === username.toLowerCase()){
    alert("Password cannot be the same as username.");
    e.preventDefault();
    return;
}

if(password1 !== password2){
    alert("Passwords do not match.");
    e.preventDefault();
    return;
}

});

</script>
